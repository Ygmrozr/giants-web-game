name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Backend dependencies yükle
        run: npm install
        working-directory: backend

      - name: Lint çalıştır
        run: npm run lint
        working-directory: backend